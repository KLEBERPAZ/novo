<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer Aposta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Fazer Aposta</h1>
        <form action="{{ url_for('place_bet') }}" method="post">
            <div>
                <label for="numero1">Número 1:</label>
                <select id="numero1" name="numero1" required>
                    {% for i in range(1, 61) %}
                        <option value="{{ '{:02d}'.format(i) }}">{{ '{:02d}'.format(i) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="numero2">Número 2:</label>
                <select id="numero2" name="numero2" required>
                    {% for i in range(1, 61) %}
                        <option value="{{ '{:02d}'.format(i) }}">{{ '{:02d}'.format(i) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="numero3">Número 3:</label>
                <select id="numero3" name="numero3" required>
                    {% for i in range(1, 61) %}
                        <option value="{{ '{:02d}'.format(i) }}">{{ '{:02d}'.format(i) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="numero4">Número 4:</label>
                <select id="numero4" name="numero4" required>
                    {% for i in range(1, 61) %}
                        <option value="{{ '{:02d}'.format(i) }}">{{ '{:02d}'.format(i) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="numero5">Número 5:</label>
                <select id="numero5" name="numero5" required>
                    {% for i in range(1, 61) %}
                        <option value="{{ '{:02d}'.format(i) }}">{{ '{:02d}'.format(i) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="numero6">Número 6:</label>
                <select id="numero6" name="numero6" required>
                    {% for i in range(1, 61) %}
                        <option value="{{ '{:02d}'.format(i) }}">{{ '{:02d}'.format(i) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="valor">Valor da Aposta:</label>
                <input type="number" id="valor" name="valor" required>
            </div>
            <div>
                <label for="participante">Participante:</label>
                <select id="participante" name="participante" required>
                    {% for participante in participantes %}
                        <option value="{{ participante.nome }}">{{ participante.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit">Apostar</button>
        </form>
        <a href="{{ url_for('home') }}">Voltar</a>
    </div>
</body>
</html>
